<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1a1a2e">
    <title>Prowlarr Mobile</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div id="app">
        <!-- Tab Bar -->
        <nav class="tab-bar">
            <button class="tab active" data-tab="search">
                <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
                </svg>
                <span>Search</span>
            </button>
            <button class="tab" data-tab="downloads">
                <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
                </svg>
                <span>Downloads</span>
            </button>
        </nav>

        <!-- Search Tab -->
        <div class="tab-content active" id="tab-search">
            <div class="search-bar">
                <input type="text" id="search-input" placeholder="Search torrents..." autocomplete="off">
                <button id="search-btn" class="btn-primary">Search</button>
            </div>
            <div id="search-results" class="results-list">
                <div class="empty-state">Search for torrents across your Prowlarr indexers</div>
            </div>
        </div>

        <!-- Downloads Tab -->
        <div class="tab-content" id="tab-downloads">
            <div class="downloads-header">
                <h2>Downloads</h2>
                <button id="refresh-btn" class="btn-icon" title="Refresh">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/>
                        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
                    </svg>
                </button>
            </div>
            <div class="move-files-bar">
                <button class="btn-move btn-move-movie" onclick="moveFiles('movie')">Move to Movies</button>
                <button class="btn-move btn-move-show" onclick="moveFiles('show')">Move to TV Shows</button>
            </div>
            <div id="downloads-list" class="results-list">
                <div class="empty-state">No active downloads</div>
            </div>
        </div>

        <!-- Toast -->
        <div id="toast" class="toast hidden"></div>

        <!-- Confirm Modal -->
        <div id="modal-overlay" class="modal-overlay hidden">
            <div class="modal">
                <p id="modal-message"></p>
                <div class="modal-actions">
                    <button id="modal-cancel" class="btn-secondary">Cancel</button>
                    <button id="modal-confirm" class="btn-danger">Delete</button>
                </div>
            </div>
        </div>
    </div>
    <script src="/static/js/app.js"></script>
</body>
</html>
